<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Chi tiết sách</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .highlight-price {
      color: #dc3545;
      font-weight: bold;
      font-size: 1.1rem;
    }
  </style>
</head>
<body class="bg-light">

<div th:replace="~{fragments/layout :: header('Trang chi tiết sách')}"></div>

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-8">

      <div th:if="${book != null}" class="card shadow-sm">
        <div class="card-header bg-success text-white">
          <h3 class="mb-0">Thông tin chi tiết sách</h3>
        </div>

        <div class="card-body">
          <table class="table table-bordered">
            <tr>
              <th style="width: 30%;">Mã sách</th>
              <td th:text="${book.id}">1</td>
            </tr>
            <tr>
              <th>Tên sách</th>
              <td th:text="${book.title}">Dragon Ball Super</td>
            </tr>
            <tr>
              <th>Tác giả</th>
              <td th:text="${book.author}">Nguyễn Văn A</td>
            </tr>
            <tr>
              <th>Giá bán</th>
              <td>
                                <span th:text="${#numbers.formatDecimal(book.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"
                                      th:classappend="${book.price >= 300000} ? 'highlight-price' : ''">
                                    350,000 VNĐ
                                </span>
              </td>
            </tr>
          </table>

          <div class="mt-3">
            <a th:href="@{/books}" class="btn btn-secondary">
              Quay lại danh sách
            </a>
          </div>
        </div>
      </div>

      <div th:if="${book == null}" class="alert alert-danger shadow-sm">
        Không tìm thấy sách.
      </div>

    </div>
  </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
