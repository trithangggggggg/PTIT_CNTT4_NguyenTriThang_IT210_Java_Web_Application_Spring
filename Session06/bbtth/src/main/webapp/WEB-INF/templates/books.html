<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách sách</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        .highlight-row {
            background-color: #fff3cd !important;
            font-weight: bold;
        }
    </style>
</head>
<body class="bg-light">

<div th:replace="~{fragments/layout :: header('Trang danh sách sách')}"></div>

<div class="container">
    <div class="card shadow-sm">
        <div class="card-header bg-primary text-white">
            <h3 class="mb-0">Danh sách tất cả sách</h3>
        </div>

        <div class="card-body">
            <table class="table table-bordered table-hover align-middle">
                <thead class="table-dark text-center">
                <tr>
                    <th>ID</th>
                    <th>Tên sách</th>
                    <th>Tác giả</th>
                    <th>Giá</th>
                    <th>Thao tác</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="book : ${books}"
                    th:classappend="${book.price >= 300000} ? 'highlight-row' : ''">
                    <td class="text-center" th:text="${book.id}">1</td>
                    <td th:text="${book.title}">Tên sách</td>
                    <td th:text="${book.author}">Tác giả</td>
                    <td class="text-end"
                        th:text="${#numbers.formatDecimal(book.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">
                        350,000 VNĐ
                    </td>
                    <td class="text-center">
                        <a th:href="@{/books/{id}(id=${book.id})}" class="btn btn-outline-primary btn-sm">
                            Xem chi tiết
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>

            <div class="alert alert-warning mt-3 mb-0">
                Các sách có giá từ <strong>300,000 VNĐ</strong> trở lên sẽ được làm nổi bật.
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
