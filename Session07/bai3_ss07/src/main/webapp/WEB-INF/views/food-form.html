<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm món ăn mới</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <h2 class="mb-4">Thêm món ăn mới</h2>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

    <form th:action="@{/foods/add}" method="post" enctype="multipart/form-data">
        <div class="mb-3">
            <label class="form-label">Tên món ăn</label>
            <input type="text" name="name" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Danh mục</label>
            <select name="category" class="form-select">
                <option th:each="c : ${categories}" th:value="${c}" th:text="${c}"></option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Giá tiền</label>
            <input type="number" step="0.01" name="price" class="form-control" required>
        </div>

        <div class="mb-3">
            <label class="form-label">Hình ảnh</label>
            <input type="file" name="image" class="form-control" accept=".jpg,.jpeg,.png" required>
        </div>

        <button type="submit" class="btn btn-primary">Thêm món</button>
    </form>
</div>
</body>
</html>
