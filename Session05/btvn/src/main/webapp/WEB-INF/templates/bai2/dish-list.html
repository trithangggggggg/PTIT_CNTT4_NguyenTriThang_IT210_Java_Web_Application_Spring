<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Danh sách món ăn</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-4">

<h1 class="mb-4">Danh sách món ăn</h1>

<!-- Danh sách rỗng -->
<div th:if="${dishes == null or #lists.isEmpty(dishes)}"
     class="alert alert-warning">
    Hiện tại nhà hàng đang cập nhật thực đơn, vui lòng quay lại sau
</div>

<!-- Có dữ liệu -->
<table class="table table-bordered table-striped"
       th:unless="${dishes == null or #lists.isEmpty(dishes)}">

    <thead class="table-dark">
    <tr>
        <th>ID</th>
        <th>Tên món</th>
        <th>Giá</th>
        <th>Trạng thái</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="dish : ${dishes}">
        <td th:text="${dish.id}"></td>
        <td th:text="${dish.name}"></td>
        <td th:text="${dish.price} + ' VNĐ'"></td>

        <td>
            <span th:if="${dish.available}" class="text-success fw-bold">
                Còn hàng
            </span>
            <span th:unless="${dish.available}" class="text-danger fw-bold">
                Hết hàng
            </span>
        </td>
    </tr>
    </tbody>

</table>

</body>
</html>
